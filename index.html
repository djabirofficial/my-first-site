<!DOCTYPE html>
<html>
<head>
<title>WORLD MUSIC ZONE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:linear-gradient(black,#020);
color:#0f0;
font-family:sans-serif;
margin:0;
}

h2{
text-align:center;
padding:10px;
}

.card{
background:#0a0a0a;
padding:15px;
margin:10px;
border-radius:15px;
box-shadow:0 0 10px #0f0;
}

button{
background:#0f0;
border:none;
padding:10px;
margin-top:5px;
border-radius:8px;
font-weight:bold;
}

input,select{
padding:10px;
width:95%;
border-radius:8px;
border:none;
margin-top:5px;
background:#111;
color:#0f0;
}

audio{
width:100%;
margin-top:10px;
}

#songs .card{
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;}
}
</style>
</head>

<body>

<h2>🎧 WORLD MUSIC ZONE</h2>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<!-- ADMIN UPLOAD -->
<div class="card" id="adminPanel" style="display:none">
<h3>🔥 Upload Song (Admin)</h3>
<input id="title" placeholder="Song Title"><br><br>
<input id="url" placeholder="MP3 Link"><br><br>
<select id="cat">
<option>Bangla Remix</option>
<option>Hindi Remix</option>
<option>English Remix</option>
<option>Club Mix</option>
</select><br><br>
<button onclick="upload()">Upload</button>
</div>

<!-- SONG LIST -->
<div id="songs"></div>

<!-- SUPPORT -->
<div class="card">
<h3>📩 Support</h3>
<input id="msg" placeholder="Problem likho"><br><br>
<button onclick="send()">Send</button>
<p id="reply"></p>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBrb-GHBDLE61Tt9Kn3DZcx3Hid_RoYP04",
  authDomain: "world-music-zone.firebaseapp.com",
  projectId: "world-music-zone"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
let e=document.getElementById('email').value;
let p=document.getElementById('pass').value;

if(!e || !p){
alert("Email & Password dao!");
return;
}

auth.signInWithEmailAndPassword(e,p)
.then(()=>{
console.log("Login success");
})
.catch((err)=>{
console.log(err.message);

auth.createUserWithEmailAndPassword(e,p)
.then(()=>{
alert("Account create hoise, abar login dao");
})
.catch((e)=>{
alert(e.message);
});
});
}

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display='none';
main.style.display='block';

// ADMIN CHECK
if(user.email=="djabirmixofficial@gmail.com"){
adminPanel.style.display='block';
}

loadSongs();
}
});

// UPLOAD
function upload(){
db.collection("songs").add({
title:title.value,
url:url.value,
cat:cat.value
});
alert("Uploaded!");
}

// LOAD SONGS
function loadSongs(){
db.collection("songs").onSnapshot(snap=>{
songs.innerHTML+=`
<div class="card">
<h3>🎵 ${d.title}</h3>

<audio controls src="${d.url}"></audio>

<button onclick="this.nextElementSibling.style.display='block'">❤️ Like to Unlock</button>

<a href="${d.url}" download style="display:none">
<button>⬇ Download</button>
</a>

<button onclick="window.open('https://instagram.com/abirr.vibes')">💰 Premium Unlock</button>

<p style="font-size:12px;color:#aaa">Category: ${d.cat}</p>
</div>`;
});
});
}

// SUPPORT
function send(){
db.collection("support").add({
msg:msg.value
});
reply.innerText="Message sent ✅";
}
</script>

</body>
</html>
