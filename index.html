<!DOCTYPE html>
<html>
<head>
<title>WORLD MUSIC ZONE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:black;color:#0f0;font-family:sans-serif}
.card{background:#111;padding:15px;margin:10px;border-radius:10px}
button{background:#0f0;border:none;padding:8px;margin-top:5px}
input{padding:8px;width:90%}
</style>

</head>
<body>

<h2>WORLD MUSIC ZONE</h2>

<div class="card" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<div class="card">
<h3>🎵 Song</h3>
<audio controls></audio><br>
<button onclick="like()">❤️ Like to Unlock</button>
<button id="dl" style="display:none">⬇ Download</button>
<button onclick="paid()">💰 Instagram Unlock</button>
</div>

<div class="card">
<h3>📩 Support</h3>
<input id="msg" placeholder="Problem likho"><br><br>
<button onclick="send()">Send</button>
<p id="reply"></p>
</div>

</div>

<!-- ✅ CORRECT FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
// 
const firebaseConfig = {
  apiKey: "AIzaSyBrb-GHBDLE61Tt9Kn3DZcx3Hid_RoYP04",
  authDomain: "world-music-zone.firebaseapp.com",
  projectId: "world-music-zone"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN
function login(){
let e=document.getElementById('email').value;
let p=document.getElementById('pass').value;

auth.signInWithEmailAndPassword(e,p)
.then(()=>{
document.getElementById('loginBox').style.display='none';
document.getElementById('main').style.display='block';
})
.catch(()=>{
auth.createUserWithEmailAndPassword(e,p)
.then(()=>{
alert('Account Created ✔️ Login again');
})
});
}

// LIKE
function like(){
document.getElementById('dl').style.display='block';
}

// PAID
function paid(){
window.open('https://www.instagram.com/abirr.vibes');
}

// SUPPORT
function send(){
document.getElementById('reply').innerText=
'WORLD MUSIC ZONE Support: Message received ✅';
}
</script>

</body>
</html>
