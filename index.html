<!DOCTYPE html>
<html>
<head>
<title>WORLD MUSIC ZONE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#000;
color:#00ffcc;
font-family:sans-serif;
margin:0;
}
header{
text-align:center;
padding:15px;
font-size:22px;
text-shadow:0 0 10px #0ff;
}
.card{
background:#111;
margin:10px;
padding:15px;
border-radius:10px;
}
input,select{
width:95%;
padding:10px;
margin-top:5px;
background:#000;
color:#0ff;
border:none;
}
button{
padding:10px;
margin-top:5px;
background:#0ff;
border:none;
}
audio{width:100%}
</style>
</head>

<body>

<header>🎧 WORLD MUSIC ZONE</header>

<div class="card" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<div class="card" id="adminPanel" style="display:none">
<h3>Upload Song</h3>
<input id="title" placeholder="Title">
<input id="url" placeholder="MP3 Link">
<select id="cat">
<option>Bangla Remix</option>
<option>Hindi Remix</option>
<option>English Remix</option>
<option>Club Mix</option>
</select>
<button onclick="upload()">Upload</button>
</div>

<div id="songs"></div>

<div class="card">
<h3>Support</h3>
<input id="msg" placeholder="Problem likho">
<button onclick="send()">Send</button>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyBrb-GHBDLE61Tt9Kn3DZcx3Hid_RoYP04",
authDomain: "world-music-zone.firebaseapp.com",
projectId: "world-music-zone"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
let e=email.value;
let p=pass.value;

if(!e || !p){
alert("Enter email & password");
return;
}

auth.signInWithEmailAndPassword(e,p)
.then(()=>{})
.catch(()=>{
auth.createUserWithEmailAndPassword(e,p)
.then(()=>alert("Account created, login again"));
});
}

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
main.style.display="block";

if(user.email==="djabirmixofficial@gmail.com"){
adminPanel.style.display="block";
}

loadSongs();
}
});

// UPLOAD
function upload(){
db.collection("songs").add({
title:title.value,
url:url.value,
cat:cat.value
});
alert("Uploaded");
}

// LOAD SONG
function loadSongs(){
db.collection("songs").onSnapshot(snap=>{
songs.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();

songs.innerHTML+=`
<div class="card">
<h3>${d.title}</h3>
<audio controls src="${d.url}"></audio>
<a href="${d.url}" download><button>Download</button></a>
<p>${d.cat}</p>
</div>`;
});
});
}

// SUPPORT
function send(){
db.collection("support").add({msg:msg.value});
alert("Sent");
}
</script>

</body>
  </html>
