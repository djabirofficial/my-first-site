<!DOCTYPE html>
<html>
<head>
<title>WORLD MUSIC ZONE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:linear-gradient(135deg,#000,#001a1a,#000);
  color:#00ffcc;
  font-family:sans-serif;
  margin:0;
}

h2{
  text-align:center;
  padding:15px;
  text-shadow:0 0 20px #00ffcc;
}

.card{
  background:#0a0a0a;
  padding:15px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 0 15px #00ffcc;
}

button{
  background:#00ffcc;
  border:none;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  font-weight:bold;
}

input,select{
  padding:10px;
  width:95%;
  border-radius:8px;
  border:none;
  margin-top:5px;
  background:#111;
  color:#00ffcc;
}

audio{
  width:100%;
}
</style>
</head>

<body>

<h2>🎧 WORLD MUSIC ZONE</h2>

<div class="card" id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<div class="card" id="adminPanel" style="display:none">
<h3>Upload Song</h3>
<input id="title" placeholder="Song Title"><br><br>
<input id="url" placeholder="MP3 Link"><br><br>
<select id="cat">
<option>Bangla Remix</option>
<option>Hindi Remix</option>
<option>English Remix</option>
<option>Club Mix</option>
</select><br><br>
<button onclick="upload()">Upload</button>
</div>

<div id="songs"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBrb-GHBDLE61Tt9Kn3DZcx3Hid_RoYP04",
  authDomain: "world-music-zone.firebaseapp.com",
  projectId: "world-music-zone"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN (FIXED)
function login(){
  let email = document.getElementById('email').value;
  let pass = document.getElementById('pass').value;

  if(!email || !pass){
    alert("Email & Password dao!");
    return;
  }

  auth.signInWithEmailAndPassword(email,pass)
  .then(()=>{
    alert("Login Success 🔥");
  })
  .catch((err)=>{
    alert(err.message);
  });
}

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('loginBox').style.display="none";
    document.getElementById('main').style.display="block";

    if(user.email=="djabirmixofficial@gmail.com"){
      document.getElementById('adminPanel').style.display="block";
    }

    loadSongs();
  }
});

// UPLOAD
function upload(){
  let title=document.getElementById('title').value;
  let url=document.getElementById('url').value;
  let cat=document.getElementById('cat').value;

  if(!title || !url){
    alert("Fill all");
    return;
  }

  db.collection("songs").add({title,url,cat});
  alert("Uploaded ✅");
}

// LOAD SONG
function loadSongs(){
  db.collection("songs").onSnapshot(snap=>{
    document.getElementById('songs').innerHTML="";
    snap.forEach(doc=>{
      let d=doc.data();

      document.getElementById('songs').innerHTML+=`
      <div class="card">
      <h3>${d.title}</h3>
      <audio controls src="${d.url}"></audio>
      <a href="${d.url}" download>
      <button>Download</button>
      </a>
      <p>${d.cat}</p>
      </div>`;
    });
  });
}
</script>

</body>
</html>
