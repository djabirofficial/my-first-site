<!DOCTYPE html>
<html>
<head>
<title>WORLD MUSIC ZONE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:linear-gradient(135deg,#000,#001a1a,#000);
color:#00ffcc;
font-family:sans-serif;
margin:0;
}

header{
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
text-shadow:0 0 15px #00ffcc;
}

.card{
background:#0a0a0a;
margin:10px;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px #00ffcc;
}

input,select{
width:95%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#111;
color:#00ffcc;
}

button{
background:#00ffcc;
border:none;
padding:10px;
margin-top:8px;
border-radius:8px;
font-weight:bold;
}

audio{width:100%}

.song{
margin-top:10px;
}
</style>
</head>

<body>

<header>🎧 WORLD MUSIC ZONE</header>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<!-- ADMIN -->
<div class="card" id="adminPanel" style="display:none">
<h3>🔥 Upload Song</h3>
<input id="title" placeholder="Song Title">
<input id="url" placeholder="MP3 Link">
<select id="cat">
<option>Bangla Remix</option>
<option>Hindi Remix</option>
<option>English Remix</option>
<option>Club Mix</option>
</select>
<button onclick="upload()">Upload</button>
</div>

<!-- SONGS -->
<div id="songs"></div>

<!-- SUPPORT -->
<div class="card">
<h3>📩 Support</h3>
<input id="msg" placeholder="Problem likho">
<button onclick="send()">Send</button>
<p id="reply"></p>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBrb-GHBDLE61Tt9Kn3DZcx3Hid_RoYP04",
  authDomain: "world-music-zone.firebaseapp.com",
  projectId: "world-music-zone"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
let e=email.value;
let p=pass.value;

auth.signInWithEmailAndPassword(e,p)
.then(()=>{})
.catch(()=>{
auth.createUserWithEmailAndPassword(e,p)
.then(()=>alert("Account created! Login again"));
});
}

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display='none';
main.style.display='block';

if(user.email=="djabirmixofficial@gmail.com"){
adminPanel.style.display='block';
}

loadSongs();
}
});

// UPLOAD
function upload(){
db.collection("songs").add({
title:title.value,
url:url.value,
cat:cat.value
});
alert("Uploaded ✅");
}

// LOAD SONG
function loadSongs(){
db.collection("songs").onSnapshot(snap=>{
songs.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();

songs.innerHTML+=`
<div class="card song">
<h3>🎵 ${d.title}</h3>
<audio controls src="${d.url}"></audio>

<button onclick="this.nextElementSibling.style.display='block'">❤️ Like to Unlock</button>

<a href="${d.url}" download style="display:none">
<button>⬇ Download</button>
</a>

<button onclick="window.open('https://instagram.com/abirr.vibes')">💰 Premium</button>

<p>${d.cat}</p>
</div>`;
});
});
}

// SUPPORT
function send(){
db.collection("support").add({msg:msg.value});
reply.innerText="Message sent ✅";
}
</script>

</body>
</html>
